<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Essential meta tags for proper rendering and responsive behavior -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karlheinz Rousseau Portfolio</title>
    <!-- Link to Google Font (Josefin Sans; Catamaran, Source Sans 3)-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <main>
        <!-- Hero section - Initially centered, moves to top on button click -->
        <section class="hero">
            <h1>Karlheinz Rousseau</h1>
            <button class="cta-button">See Through My Eyes</button>
        </section>
        
        <!-- Projects grid - Hidden initially, appears after hero section moves -->
        <div class="projects-grid">
            <!-- Individual project cards - Each links to its dedicated page -->
            <!-- Project Card 1 -->
            <div class="project-card" onclick="location.href='Ozymandias.html'">
                <img src="images/Covers/buzludzha-cover.jpg" alt="Ozymandias">
                <div class="project-title">Ozymandias</div>
            </div>
            <div class="project-card" onclick="location.href='Sofia.html'">
                <img src="images/Covers/sofia-cover.jpg" alt="Sofia">
                <div class="project-title">Sofia</div>
            </div>
            <div class="project-card" onclick="location.href='ghost-stories.html'">
                <img src="images/Covers/bnwstreet-cover.jpg" alt="Ghost Stories">
                <div class="project-title">Ghost Stories</div>
            </div>
            <!-- Additional project cards follow the same structure -->
            <!-- ... -->
        </div>
    </main>

    <!-- Fixed footer that stays at bottom -->
    <footer>
        <!-- Social Icons -->
        <div class="social-icons">
            <a href="https://instagram.com/khrousseau.art" target="_blank" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="mailto:khrousseau.art@gmail.com" aria-label="Email">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
        <p>&copy; 2025 Karlheinz Rousseau<br />
            All my work is distributed under <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">Creative Commons BY-NC-ND 4.0</a>.
    </footer>

    <!-- Background -->
    <div id="bg"></div>

    <!-- Link to external JavaScript file -->
    <script src="scripts.js"></script>
</body>
</html>
