<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karlheinz Rousseau Photography</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;700&family=Great+Vibes&family=Source+Code+Pro&family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>Karlheinz Rousseau</h1>
            <a href="#" class="cta-button">
                <span>See Through My Eyes</span>
            </a>
        </div>
    </section>

    <!-- Sticky Header (Initially hidden) -->
    <header class="sticky-header hidden">
        <h1>Karlheinz Rousseau</h1>
    </header>

    <!-- Main Content (Initially hidden) -->
    <main class="hidden" id="gallery">
        <div class="gallery-container">
            <!-- Gallery Content -->
            <div class="cover-container">
                <a href="ozymandias.html">
                    <img src="images/buzludzha-cover.jpg" alt="Buzludzha Cover" class="cover-image">
                    <div class="text-overlay">
                        <h3 class="title typewriter">Ozymandias</h3>
                        <p class="subtitle">A haunting exploration of the Buzludzha Monument</p>
                    </div>
                </a>
            </div>
            <div class="cover-container">
                <img src="images/sofia-cover.jpg" alt="Sofia Cover" class="cover-image">
                <div class="text-overlay">
                    <h3 class="title handwritten">Unveiling Sofia</h3>
                    <p class="subtitle">A journey through the streets of the Bulgarian capital</p>
                </div>
            </div>
            <div class="cover-container">
                <img src="images/bnwstreet-cover.jpg" alt="Black and White Cover" class="cover-image">
                <div class="text-overlay">
                    <h3 class="title sans-serif">Ghost Stories</h3>
                    <p class="subtitle">A black-and-white street photography chronicle into the lives of the invisible</p>
                </div>
            </div>
        </div>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
